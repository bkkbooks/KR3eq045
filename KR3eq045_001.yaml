body:
  text: 卷上稀痘祕方姑蘇一寺僧賣稀痘藥服之神驗王荊石相公許以重利欲傳其方峻拒之後以十金得之於其徒乃玄參菟絲子二味等分蜜調服也公欲廣其澤見人即說後亦罕驗蓋祕方廣傳則不效人莫喻其理紫柏大師嘗問余余對曰衆生業力大制方者之心力幾何不能專之故也師擊節歎賞寒熱因用或問寒因熱用熱因寒用何謂也曰寒熱和而為平氣寒熱離而為病氣因用則是調劑寒熱也讀本草法同年邵麟武問欲學醫須識藥性欲識藥性須讀本草乎曰然讀本草有法勿看其主治麟武曰不看主治又何以知藥性也曰天豈為病而生藥哉天非為病而生藥則曰何藥可治何種病皆舉一而廢百者耳草本得氣之偏人得氣之全偏則病矣以彼之偏補我之偏醫藥所由起也讀本草者驗其味察其氣觀其色考其以何時苗以何時華以何時實以何時萎則知其稟何氣而生凡見某病為何氣不足即可以此療之矣靈樞經邪客篇論不得臥者因厥氣客於五臟六腑則衛氣獨衛其外行於陽不得入於陰行於陽則陽氣盛陽氣盛則陽煿滿不得入於陰陰氣虛故目不瞑治之以半夏湯夏至而後一陰生半夏茁其時則知其稟一陰之氣而生也所以能通行陰之道五月陽氣尚盛故生必三葉其氣薄為陽中之陰故其引衛氣從陽入陰又其味辛能散陽蹻之滿故飲之而陰陽通能臥立至也李明之治王善夫小便不通漸成中滿是無陰而陽氣不化也凡利小便之藥皆淡味滲泄為陽止是氣藥陽中之陰所以不效隨處以稟北方寒水所化大苦寒氣味俱陰者黃柏知母桂為引用為丸投之溺出如湧泉專眄成流蓋此病惟是下焦真陰不足故純用陰中之陰不欲干涉陽分及上中二焦故為丸且服之多也本草何嘗言半夏治不得臥黃柏知母利小便哉則據主治而覓藥性亦何異夫鑄舟而求劍者乎麟武曰善哉未之前聞也藥誤面浮跗腫小便祕澀未必成水也服滲利之藥而不已則水症成矣胸滿腹膨悒悒不快未必成脹也服破氣之藥而不已則脹症成矣咳嗽吐血時時發熱未必成瘵也服四物黃柏知母之藥而不已則瘵症成矣氣滯膈塞飲食不下未必成膈也服青陳枳朴寬中之劑而不已則膈症成矣成則不可復藥痰火痰火上壅喘嗽發熱足反冷者服消痰降火藥必死宜量其輕重而用人參多至一兩少則三五錢佐以桂附煎濃湯候冷飲之立愈韓懋所謂假對真也然此症實由腎中真水不足火不受制而上炎桂附火類也下咽之初得其冷性暫解鬱及至下焦熱性始發從其窟宅而招之同氣相求火必下降自然之理也然非人參君之則不能奏功中風每見時師治中風初用八味順氣散多不得效已而用二陳四物加膽星天麻之類自謂穩當之極可以久而奏功而亦竟無一驗何也蓋妄以南星半夏為化痰之藥當歸川芎為生血之劑而泥於成方變通無法故也正不知通血脈助真元非大劑人參不可而有痰者惟宜竹瀝少加薑汁佐之不宜輕用燥劑至於歸地甘黏能滯脾氣使脾精不運何以能愈癱緩豈若人參出陽入陰少則留多則宣無所不達哉其能通血脈雖明載本草人誰信之里中一老醫右手足廢不能起於床者二年矣人傳其不起過數月遇諸塗訊之曰吾之病幾危矣始服順氣行痰之藥了無應驗薄暮神志輒昏度不可支令家人煎進十全大補湯即覺清明遂日服之數月能扶策而起無何則又能捨策而步矣經云邪之所湊其氣必虛吾治其虛不理其邪而邪自去吾所以獲全也余曰有是哉使進順氣疏風之藥不輟者墓木拱矣然此猶拘於成方不能因病而變通隨時而消息故奏功稍遲使吾為之當不止是也姑書之以俟明者採焉痰人身無痰痰者津液所聚也五穀入於胃也其糟粕津液宗氣分為三隧故氣積於胸中出於喉嚨以貫心肺而行呼吸焉榮氣者泌其津液注之於脈化以為血以榮四末內注五臟六腑以應刻數焉衛氣者出其悍氣之慓疾而先行於四末分肉皮膚之間而不休者也晝行於陽夜行於陰常從足少陰之分間行於五臟六腑實則行虛則聚聚則為痰散則還為津液氣血初非經絡臟腑之中別有邪氣穢物號稱曰痰以為身害必去之而後已者也余幼而喜唾痰愈唾愈多已而戒之每喉間梗梗不可耐輒呷白湯數口咯出口中用舌攪研令碎因而漱之百餘次津液滿口即隨鼻中吸氣咽下以意送至丹田默存少頃咽間清泰矣如未清即再漱再咽以化盡為度方咯出時其味甚咸漱久則甘世人乃謂淤濁之物無澄而復清之理何其謬哉吾嘗渡河矣見舟人掬濁流而入之甕摻入礬末數分即時澄清此可以悟治痰之法也故上焦宗氣不足則痰聚胸膈喉間梗梗鼻息氣短中焦營氣不足則血液為痰或壅脈道變幻不常下焦衛氣不足則勢不悍痰液隨而滯四末分肉之間麻木壅腫治其本則補之宜先先其標則化之有法略露端倪以需穎者之自悟云如稠而不清宜用澄之之法散而不收宜用攝之之法下虛上溢宜用復之之法上壅下塞宜用墜之之法何謂澄之之法如白礬有卻水之性既能澄濁流豈不足以清痰乎然猶不可多用至於杏仁亦能澄清而濟水之性清徑能穴地伏流煮而為膠最能引痰下膈體此用之所謂澄之之法也何謂攝之之法如大腸暴泄脫氣及小便頻數者益智仁一味遂能收功蓋有安三焦調諸氣攝涎唾而固滑脫之妙故醫方每以治多唾者專取其辛而能攝非但溫胃寒而已所謂攝之之法也何謂復之之法腎間真氣不能上升則水火不交水火不交則氣不通而津液不注於腎敗濁而為痰故用八味丸地黃山藥山茱萸以補腎精茯苓澤瀉以利水道肉桂附子以潤腎燥肉桂附子熱燥之藥何以能潤曰經不云乎腎惡燥急食辛以潤之開腠理致津液通氣道所謂復之之法也何謂墜之之法如痰涎聚於咽膈之間為嗽為喘為膈為噎為眩為暈大便或時祕而不通宜用養正丹靈砂丹重劑以引而下之使不相併所謂墜之之法也至於寒者熱之熱者寒之微者送之甚者從之堅者削之客者除之勞者溫之結者散之留者行之濕者燥之燥者濡之急者緩之損者益之逸者行之驚者平之薄之卻之開之發之見於素問至真要大論者應變不窮尤為治痰之要法在圓機之士熟察而妙用之不可一途而取也若乃虛症有痰勿理其痰但治其虛虛者既復則氣血健暢津液通流何痰之有今人乃謂補藥能滯氣而生痰此聾聵之言流害無窮矣丹陽賀魯庵年七十餘膈間有痰不快飲食初無大害就醫京口投以越鞠丸清氣化痰丸胸次稍寬日日吞之遂不輟口年餘困頓不堪僦舟來訪問脈於余則大肉已脫二手脈如遊絲太溪絶不至矣見余有難色因曰吾亦自分必死但膈間脹滿太甚大便祕結不通殊以為苦但得稍寬即瞑目無憾也因強余疏方以至親難辭教用人參白朮之類大劑進之少頃如廁下積痰升餘胸膈寬舒更數日而死夫二丸乃時師常用之藥本欲舒郁適增其痞本欲清痰反速其斃豈不悖哉明效若斯而病家與醫了無幡然悔悟懲創之色豈宿業已深大命垂絶故天塞其哀而使之決不可返也耶不然何不論於理而甘就屠戮者之衆也頭痛東垣云高巔之上惟風可到故味之薄者陰中之陽自地升天者也所以頭痛皆用風藥治之總其大體而言之也然患痛人血必不活而風藥最能燥血故有愈治而愈甚者此其要尤在養血不可不審也一人寒月往返燕京感受風寒遂得頭痛數月不愈一切頭風藥無所不服厥痛愈甚肢體羸瘦扶策踵門求余方藥余思此症明是外邪緣何解散不效語不云乎治風先治血血活風自滅本因血虛而風寒入之今又疏泄不已烏乎能愈也又聞之痛則不通通則不痛故用當歸生血活血用木通通利關竅血脈而行當歸之力問渠能酒乎曰能而且多近為醫戒之不敢飲因令用斗酒入二藥其中浸三晝夜重湯煮熟乘熱飲之至醉則去枕而臥臥起其痛如失所以用酒者欲二藥之氣上升於頭也至醉乃臥者醉則浹肌膚淪骨髓藥力方到臥則血有所歸其神安也有志活人者推此用之思過半矣然有火鬱於上而痛者經云火淫所勝民病頭痛治以寒劑宜酒芩石膏之類治之又不可泥於此法也又有一方用當歸川芎連翹熟地各二錢水煎六分去渣以龍腦薄荷二錢置碗底將藥乘沸衝下鼻吸其氣俟溫即服服即安臥其效甚速然亦為血虛者設耳補精忌涼補精之藥固忌溫熱然以天道驗之時非溫熱則地氣不能升而為云天氣不能降而為雨人身之道何莫異斯然則腎雖寒補實資溫助故昔人以蓯蓉巴戟故紙茴香之類發揚腎氣使陰陽交蒸而生精知此理也自丹溪出而黃柏知母為補腎之藥誤人多矣夫黃柏知母雖稟北方寒水之氣而生然其性降而不升殺而不生暫用其寒可以益水久服其苦反能助火經不云乎久而增氣物化之常也氣增而久夭之由也渴由血虛治渴必須益血蓋血即津液所化津液既少其血必虛故須益血凡吐血之後多能發渴益知渴病生於血虛也脾虛補腎今人只知脾胃虛則當補補之不應則補其母如是足矣而不知更有妙處補腎是也脾土克腎水不相為用如何反補其所勝以滋肝木曰不然此其妙正在相剋處也五行以相剋為用所以尚書大禹謨說個水火金木土谷惟修此聖人立言之妙其說甚長今且以水與土言之水不得土何處發生何處安著土不得水卻是一個燥岔物事如何生出萬物來水土相滋動植化生此造化相剋之妙而醫家所以謂脾為太陰濕土濕之一字分明土全賴水為用也故曰補脾必先補腎至於腎精不足則又須補之以味古人以謂補腎不若補脾二言各有妙理不可偏廢也口糜經云膀胱移熱於小腸膈腸不便上為口糜宜以清涼之劑利小便易老用五苓散導赤散相合服之神效又云少陽之復火氣內發上為口糜則又當用苦寒之劑也如二法不效則宜加炮乾薑之類反佐之身重宜補身重之症時師止知燥濕而不知補虛素問示衆容論篇歷言肝虛腎脾虛皆令人體重煩冤足知身重乃虛症也宜用補中益氣湯加減八味丸消息與之五積治積之法理氣為先氣既升降津液流暢積聚何由而生丹溪乃謂氣無形而不能作塊成聚只以消痰破血為主誤矣天地間有形之物每自無中生何止積聚也戴復庵以一味大七氣湯治一切積聚知此道歟肝積肥氣用前湯煎熱待冷卻以鐵器燒通紅以藥淋之乘熱服肺積息賁用前湯加桑白皮半夏杏仁各半錢心積伏梁用前湯加石菖蒲半夏各半錢脾積痞氣用前湯下紅圓子腎積奔豚用前湯倍桂加茴香炒楝子肉各半錢陰維病難經云陰維為病苦心痛陰維行諸陰而主榮榮為血血屬心故苦心痛也潔古云其治在足少陽三陰交仲景太陰證則理中湯少陰證則四逆湯厥陰證則當歸四逆吳茱萸湯氣疾求腎今人治一切氣疾止知求之脾肺而不知求之腎所以鮮效夫腎間動氣為五臟六腑之本十二經脈之根呼吸之門三焦之原房勞過度或稟受素弱腎經不足氣無管束遂多鬱滯是生諸疾醫者以為是當理氣枳朴烏藥香附之類集然前陳而氣愈不可理矣宣之泄之以快藥下之而人之死者已過半矣於是醫之識見稍高者以為脾虛不能運化精微之故而衆事於補然僅可以苟延歲月而多至於因循蹉跎而不可救此不知補腎之過也凡氣藥內須兼用和血之藥佐之蓋未有氣滯而血能和者血不和則氣益滯矣小便不利膀胱者州都之官津液藏焉氣化則能出矣何謂氣化津液乃氣所化也經脈別論云飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行益譬之蒸物然陽氣上薰金甑遂為津而下滴此脾氣熏蒸肺葉所以遂能調水道而輸膀胱也故小便不通之症審系氣虛而水涸者利之益甚須以大劑人參少佐升麻煎湯飲之陽升陰降是地氣上為云天氣下為雨也自然通利矣丹溪嘗治一人傷寒得汗熱退後脈尚洪此洪脈作虛脈論與人參黃耆白朮炙甘草當歸芍藥陳皮數日其脈仍大又小便不通小腹下妨悶頗為所苦但仰臥則點滴而出曰補藥服之未至前藥內倍加黃耆人參大劑與服二日小便方利大便不通金匱真言論云北方黑色入通於腎開竅於二陰故腎陰虛則大小便難宜以地黃蓯蓉車前茯苓之屬補真陰利水道少佐辛藥開腠理致津液而潤其燥施之於老人尤宜若大小便燥結之甚求通不得登廁用力太過便仍不通而氣被掙脫下注肛門有時泄出清水而裡急後重不可忍者胸膈間梗梗作惡乾嘔有聲渴而索水飲食不進呻吟不絶欲利之則氣已下脫命在須臾再下即絶欲固之則溺與燥矢膨滿腹腸間恐反增劇欲升之使氣自舉而穢物不為氣所結自然通利則嘔惡不堪宜如何外家姑年八十餘嘗得此患余惟用調氣利小便之藥雖小獲效而不收全功常慰之令勿急性後因不能忍遽索末藥利下數行不以告余自謂稍快矣而脈忽數動一止氣息奄奄頽然床辱余知真氣已泄若不收攝恐遂無救急以生脈藥投之數劑後結脈始退因合益血潤腸丸與服勸以勿求速效勿服他藥久之自有奇功如言調理二閲月餘而二便通調四肢康勝如平時矣向使圖目前之快蔑探本之明寧免於悔哉便祕自是老人常事蓋氣固而不泄故能壽考而一時難堪輒躁擾而致疾若求通潤之方非益血而滋腎烏乎可也丸方雖為家姑設而可以通行天下故表而出之以為孝子養親仁人安老之一助云益血潤腸丸熟地黃六兩杏仁炒去皮尖枳殼麩炒黃色麻仁揀去殼令淨殼反澀大便也各三兩已上三味俱杵膏橘紅二兩五錢阿膠炒肉蓯蓉酥烹透烘乾一兩五錢蘇子炒鎖陽酥煮荊芥各一兩末之以前三味膏同杵千餘下仍加煉蜜丸如桐子大每服五六十丸空心白湯送下腦病腦者髓之海也髓不足則腦為之痛宜茸珠丹之類治之若用風藥久之必死淋濁外兄賀晉卿因有不如意事又當勞役之後忽小腹急痛欲溺溺中有白物如膿並血而下莖中急痛不可忍正如滯下後重之狀日數十行更數醫不效問方於余余作汙血治令以牛膝四兩去蘆酒浸一宿長流水十二碗煎至八碗再入桃仁一兩去皮炒紅花二錢五分當歸梢一兩酒洗赤芍藥一兩五錢木通一兩生甘草梢二錢五分苧麻根二莖同煎至二碗去渣入琥珀末二錢麝香少許分作四服一日夜飲盡勢減大半按素問奇病論云病有癃者一日數十溲此不足也今瘀血雖散宜用地黃丸加菟絲杜仲益智仁川牛膝之屬補腎陰之不足以杜復至因循未及修治遂不得全愈或閉或一夜數十起溺孔痛甚竟服前丸及以補腎之藥入煎劑調理而安從兄爾祝得淋疾日數十溲略帶黃服五苓散稍愈因腹中未快多服利藥三五日後忽見血星醫以八正散治之不應索方於余詢知其便後時有物如膿小勞即發診得六脈俱沉細左尤甚此中氣不足也便後膿血精內敗也經云中氣不足則溲便為之變宜補中益氣湯加順氣之藥以滋其陽六味地黃丸疏內敗之精以補其陰更加五味子斂耗散牛膝通血脈終劑而安此余初學醫時所録以用藥頗中肯綮故存之小便黃赤小便黃赤有寒熱虛實之別素問云諸病水液渾濁皆屬於熱宜黃柏知母之類治之此熱症也脈經云尺澀足脛逆冷小便赤宜服附子四逆湯此寒症也又云胃足陽明之脈盛則身已前皆熱其有餘於胃則消穀善飢溺色黃宜降胃火又云肝熱病者小便先黃宜降肝火此實症也又云肺手太陰之脈氣虛則肩背寒痛少氣不足以息溺色變宜補中益氣湯之類以補肺氣又云冬脈者腎脈也冬脈不及則令人䏚清脊痛小便變宜地黃丸之類以助腎脈此虛症也遺尿小便遺失責在肺而不在腎蓋肺者腎之上源又其母也上源治則下流約矣甲乙經云肺脈不及則少氣不足以息卒遺失無度故東垣謂宜安臥養氣禁勞役以黃耆人參之類補之不愈當責有熱加黃柏生地疝有補法朱丹溪於此道中甚有發明而臨病處方又多以扶植元氣為主孰意人遭厄運其手書皆不傳而傳於世者皆為盲夫俗子裁剪增續疵謬實多纂要一書其行尤盛凡丹溪長處皆為刪去甚可恨也即如疝症一門首載云專主肝經與腎經絶無相干而不知世所患由腎虛而致者甚多肝乃腎之子而前陰腎之竅也欲補其肝能無顧其母乎而世俗執肝無補法之論逢一疝症輒謂肝實過用克伐死者多矣今纂要中全不載一補法時師既無自悟之明又無他書足考焉得而不誤也按丹溪云疝有挾虛而發者其脈不甚沉緊而大豁無力者是也當以參術為君疏導藥佐之何嘗無補法哉張仲景治寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之本草衍義稱其無不應驗豈非補肝之效乎余每治病甚氣上衝心危急者以八味丸投之立應又補腎之一驗也又大便不通者當利大便如許叔微羅謙甫皆用芫花是己小便不通者當利小便如許叔微治宋荀甫以五苓散是已今如纂要言不幹腎經則五苓不當用又言疝不可下則芫花不當用而所列者惟數種破氣之藥苦辛雜收寒熱無別既不能補肝腎之真陰又不能通利二竅使邪有所泄而徒耗其氣於冥冥之中且日趨於危而不覺也豈不悖哉潰瘍一人生附骨疽膿熟不能泄潰而入腹精神昏憒粥藥不入醫無所措手延余治余診之脈細如蛛絲氣息奄奄欲絶余曰無傷也可以鈹針刺其腹膿大泄然昏清稀泄時若蟹吐沫在法為透膜不治或訊余余又曰無傷也可治參耆附子加厥陰行經之藥大劑飲之為制八味丸丸成服之食大進日啖飯升餘肉數臠旬日而平所以知可治者潰瘍之脈洪實者死徐細者生今脈微細形病相合知其受補故云可治也所以刺其腹者膿不泄有內攻之患且按之而知其創深即刺之無苦也所以信其不透膜即透膜無損者無惡候也所以服八味丸者八味丸補腎氣旺而上升則胃口開而納食故食大進也泄膿既多刀圭之藥其何能濟遷延遲久且有他患故進開胃之藥使多食粱肉以補之肌乃速生此治潰瘍之要法也青霞散方隆慶庚午余自秋闈歸則亡妹已病蓋自七月病乳腫不散八月用火針取膿醫以十全大補湯與之外敷鐵箍散不效反加喘悶九月産一女潰勢益大兩乳爛盡延及胸腋膿水稠黏出膿幾六七升略無斂勢十一月始歸就醫改用解毒和中平劑外摻生肌散龍骨寒水石等劑膿出不止流濺所及即腫泡潰膿二旁紫黑瘡口十數胸前腋下皆腫潰不可動側其勢可畏余謂産後毒氣乘虛而熾宜多服黃耆解毒補血益氣生肌而醫不敢用十二月中旬後益甚瘡口草餘諸藥盡試不效始改用余藥時膿穢黏滯煎楮葉豬蹄湯沃之頓爽乃制一方名黃耆托裡湯黃耆之甘溫以排膿益氣生肌為君甘草補胃氣解毒當歸身和血生血為臣升麻葛根漏蘆為足陽明本經藥及連翹防風皆散結疏經瓜蔞仁黍黏子解毒去腫皂角刺引至潰處白芷入陽明敗膿長肌又用川芎三分及肉桂炒柏為引用每劑入酒一盞煎送白玉霜丸疏膿解毒時膿水稠黏方盛未已不可遽用收澀之藥理宜追之乃制青霞散外摻明日膿水頓稀痛定穢解始有向安之勢至辛未新正患處皆生新肉有紫腫處俱用蔥慰法隨手消散但近腋足少陽分尚未斂乃加柴胡一錢青皮三分及倍川芎膿水將淨者即用搜膿散摻之元宵後遂全安白玉霜丸乃明礬末雞子清為丸每服一錢凡治癰疽須審經絡部分今所患正在足陽明之分少侵足少陽經分俗醫不復省別一概用藥藥無嚮導終歸罔功甚可嘆也近有患之劇甚如亡妹所苦者一庠友就余求方余以冗未及應諸瘍醫拱手以待其斃余甚傷焉議且刊布其方不忍自祕也隆慶辛未九日記青霞散治癰疽潰爛膿多不斂先用楮葉豬蹄湯洗過以此敷之青黛二錢乳香一錢五分沒藥一錢五分韶粉一錢海螵蛸一錢五分枯礬一錢白蘞一錢寒水石一錢冰片三分紅粉霜一錢各另研極細和勻再研入杏仁去皮尖草四個有死肉加白丁香五分大癰疽爛疽甚腐多加銅緑一錢五分此方專治潰瘍因血熱肉腐化而為膿故用青黛涼血解毒而使肉無腐為君乳香沒藥之活血止痛而消腫為臣寒水石之寒而佐青黛以涼血使肉不腐枯礬之收澀排膿而追毒韶粉海螵蛸之收濕止膿汁之多而不燥粉霜之拔毒白蘞之斂創冰片之透肌以為佐使諸藥多燥又假杏仁之油以潤之此制方之意也
