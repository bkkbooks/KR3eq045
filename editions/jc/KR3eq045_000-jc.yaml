body:
  text: 序鬱岡齋筆麈明王肯堂撰四庫全書採藏之其書目提要復甚稱之嘗觀自序云余幼而好博覽九流百家亡弗探也遇會心處忻然至忘寢食既寡交遊無同好可與談者時時札記以管城用為談麈蓋以天縱之才益以力學發為言論宜爾獨具隻眼排倒一切也書凡十二卷論醫學者佔十之三四余讀而稱善思所以介紹於同志因囑錢子季寅節錄專冊細加校讎並張小目釐為二卷易其名曰醫學筆麈夫王氏六科準繩集明以前醫學之大成博採廣搜幾家置一編讀此將益嘆其見高識廣得未曾有焉至此書成於萬曆三十年壬寅準繩成於萬年曆三十二年甲辰為時僅二載當是輯準繩時有所發而另存者則更可與準繩相互證云丙寅八月上海秦之濟伯未甫記
