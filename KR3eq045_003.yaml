body:
  text: 卷下發熱發熱所因不同當以兼症別之外感風寒必兼頭痛項脊強等症內傷飲食必兼頭痛吞酸噯腐等症無諸兼症而發熱不止者此必勞倦之後或用心過度而心火散溢於外故也誤用汗下涼解之法不止必死最宜審之今録一二事於下以為醫鑑外兄虞文華病發熱一醫審無身痛等症知非外感用平胃散加人參五分投之而熱愈甚又一醫至診之曰此人參之過也亟汗之汗而不解又一醫至診之曰邪入里矣急治涼膈散下之煎成欲服而余適至急止之診得六脈皆洪大搏指舉按有力則笑而語之曰此醫之所以誤也用茯苓補心湯加人參六錢麥門冬三錢酸棗仁一錢五分投之時不臥九日矣服藥即大鼾良久而蘇病已退診之脈頓微弱余為治方每用人參四錢他皆酸棗仁茯神歸朮黃耆麥門冬川芎之類令其多服勿輟遂別去數日以小便不利來扣余令間服藥導赤散明日熱復作舌黑如墨復延余診脈復洪大如囊時扣之始知連日所服藥皆減參三分之二而導赤散中一醫又加天花粉芩梔等藥故病復作也亟令用人參六錢合前諸藥大劑投之舌色始淡熱始除小便亦遂清利愈後康健逾平時使進涼膈之劑逝久矣藥可妄投哉今人不解此理至謂人參能助火發熱謬也昔人謂甘能除大熱蓋熱為心火而心以咸補以甘瀉又甘能補血血生則火有所依甘能緩中中緩則火不至妄行而自斂況人參性能安神明為手少陰經之正藥固宜其清心降火若此之神且速也脅痛雲中秦文掌教平湖與家兄同官因勞患二脅滿痛清晨並飢時尤甚以書介家兄來求方余知其肝虛當子母兼補令用黃耆白朮當歸熟地川芎山茱萸山藥酸棗仁柏子仁之類仍用防風細辛各少許薑棗煎服仍囑家兄曰勿示他醫將大笑恐口不得合也無何而秦君書來謝云服之不數劑而愈矣客長安時聞魏昆溟吏部之變因投謁忍飢歸而脅痛無他苦也而粗工以青皮枳殼之類雜投之遂至不起籲可不鑑哉白淫古方治白淫皆用收澀溫補之劑而時師株守丹溪書概作濕熱處治投黃柏知母豬苓澤瀉之類不復通變腎無瀉法利之不已其害大矣余尋常治此疾純用人參白朮茯神麥門冬酸棗仁益智仁之類無不應者新安汪機嘗治溲精以人參為君自一錢加至五錢其病乃脫知此理也余家藏丹溪書有云赤白濁即靈樞所謂中氣不足溲便為之變是也先須補中氣使升舉之而後分其臟腑氣血赤白虛實以治與夫其他邪熱所傷者固在瀉熱補虛設腎氣虛甚或火亢熱極者則不宜峻用寒涼之劑必以反佐治之要在權衡輕重而已按此皆活法要語率為纂集者刪去而止存濕熱一條流禍無窮豈不痛哉又丹溪高弟戴原禮云如白濁甚下澱如泥稠黏如膠頻逆而澀痛異常此非熱淋乃是精濁窒塞竅道而結宜五苓妙香散吞八味丸嘗聞識者云傷精白濁須肉蓯蓉治之又云用大烏梅六枚雄黃三分研細同杵勻丸如菜豆大分三服以烏梅湯咽之效治法有五治病之法有五曰和曰取曰從曰折曰屬王太僕云假如小寒之氣溫以和之大寒之氣熱以取之甚寒之氣則下奪之奪之不已則逆折之折之不盡則求其屬以衰之小熱之氣涼以和之大熱之氣寒以取之甚熱之氣則汗發之發之不已則逆制之制之不盡則求其屬以衰之今人不復辨此矣惟滯下用下藥猶存通因通用之意而粗工習焉不察也近代薛立齊善用塞因塞用法遂大破丹溪舊套以名於時若求屬之法則舉世迷焉常熟嚴養翁相公春秋高而求助於厚味補藥以致胃火久而益熾服清胃散不效如山梔石膏芩連而益甚以為涼之非也疑其當補聞余善用人參因延余診而決之才及門則口中穢氣達於四室向之欲噦余謂此正清胃散症也獨其熱甚當用從治而既失之今且欲從而不可矣當求其屬以衰之用天門冬麥門冬生地黃熟地黃石斛犀角升麻蘭香之類大劑投之數日而臭已止矣經云諸病寒之而熱者取之陰所謂求其屬也火衰於戌故峻補其陰而熱自已後因不屏肉食胃火復作大便不利目翳耳鳴不能自忍雜進涼劑時或利之遂至不起嗟乎苟知其熱則涼之而已矣則塗之人而皆可為盧扁何事醫乎目翳萬曆癸酉春余與家兄應督學試從宜興歸則從子懋錕痘後二目生翳羞明特甚窗牖幃幕皆以衣被重重覆蔽就明展二眼視之則白膜已遍覆黑睛淚如湧泉嬰科眼科投藥不效束手告技窮矣余素不嫺於嬰科莫知為計家兄曰女弟垂死之症弟能生之豈遂窮技於是試精思之余返書室閉戶而思目者清陽之所走也而忽焉有翳膜是濁陰犯之也濁陰烏敢與陽光敵故羞明特甚吾得治法矣乃以黃耆助清陽之氣為君生地當歸養目中真血為臣羌活獨活防風白芷川芎甘菊花薄荷荊芥升清陽黃芩豬膽汁車前子茯苓降濁陰為佐仍間服瀉青丸八劑而目開徹幃幕翳已去矣時眼科所進點洗之藥一切屏不用止用橄欖核磨汁敷上脾而已蓋嬰幼柔胞點洗之藥必有所傷故也腹脹腹脹多是氣虛不斂用辛散之藥反甚宜以酸收之芍藥五味子之屬少佐益智仁以其能收攝三焦之氣也朝寬暮急用當歸為主暮寬朝急用人參為主朝暮俱急二味並用按之有痛處乃瘀血也加行血藥經云濁氣在上則生抵脹又云下之則脹已謂宜用沉降之藥引濁氣之在上者而下之非通利六腑之謂也凡腫脹初起痰多發喘小便不利者服濟生腎氣丸無不效口糜用乾薑邑侯許少薇患口糜余謂非乾薑不能愈公猶疑之後竟從余言而愈從子懋鋙亦患此勢甚危急熱甚惟欲飲冷余令用人參白朮乾薑各二錢茯苓甘草各一錢煎成冷服日數服乃已噫此詎可與拘方者道也陽病見陰脈余云衢太史形氣充壯飲啖兼人辛卯季夏六月患熱病肢體不甚熱而間揚擲手足如躁擾狀昏憒不知人事時發一二語不可了而非譫也脈微細如欲絶有謂是陰症宜溫者有謂當下者時座師陸葵日先生與曾植齊馮琢庵二太史皆取決於余余謂是陽病見陰脈在法為不治然素稟如此又值酷暑外爍酒炙內炎宜狂熱如焚脈洪數有力而此何為者豈熱氣怫鬱不得伸而然耶且不大便七日矣姑以大柴胡湯下之時大黃止用二錢又熟煎而太醫王電庵力爭以為太少不若用大承氣余曰如此脈症豈宜峻下待大柴胡不應而後用調胃承氣調胃承氣不應而後用小承氣以及大承氣未晚也已服藥大便即行脈已出手足溫矣余謂電庵曰設用大承氣能免噬臍之悔哉繼以黃連解毒湯數服而平七月初遂與陸先生同典試南京不復發矣明年餘請告歸里偶得劉河間傷寒直格讀之中有云蓄熱內甚脈須疾數以其極熱蓄甚而脈道不利反致脈沉細而欲絶俗未明造化之理反謂傳為寒極陰毒者或始得之陽熱暴甚而便有此證候者或二感熱甚者通宜解毒加大承氣湯下之下後熱稍退而未愈者黃連解毒湯調之或微熱未除者涼膈散調之或失下熱極以至身冷脈微而昏冒將死若急下之則殘陰暴絶而死蓋陽氣後竭而然也不下亦死宜涼膈散或黃連解毒湯養陰退陽積熱漸以宣散則心胸轉暖脈漸以生然後撫卷而嘆曰古人先得我心矣余太史所患正失下熱極以至身冷脈微而昏冒欲絶者也下與不下大下與微下死生在呼吸間不容髮嗚呼可不慎哉宜表而出之以為世鑑相火問相火人皆能言之而迄無定見有謂心包絡三焦為相火者有謂右腎命門為相火者夫腎陰也右亦陰也腎居右陰之陰也而以為火何哉若以為心包絡三焦則包絡之位在上焦三焦分布上中下而何乃皆診於右尺也答相火專以心包絡得名謂真心君主之官不用事而包絡代之以行事猶相也治膻中在玉堂下一寸六分猶岩廊焉三焦為之府其位在寅火所生也而胎於子腎之位也一也心系有二一則上與肺連一則自心入肺二大葉間曲折向後並脊裡細絡相連貫脊體與腎相通正當七節之間所謂七節之傍中有小心者也二也自乾坤交而六子行則六子以所交之爻或用互藏其宅或用互為其根而坎離獨得所交之中者以為用故離火內陰而外陽心藏屬之坎水內陽而外陰腎藏屬之於是居於上下子午君火對化之位體天地生成變化之元始故坎中之陽於子半以後而一陽生分陰而出至卯而平至午而極午半以後而一陰生含陽而入至酉而平至子而極靜極復動而一陽復生夫如是循環無端者不唯應於歲月晝夜而已其在呼吸之間亦然難經所云命門藏精系胞者乃指相火輔於子位對化君火之用在於此猶輔午位君火之在膻中也三也問坎中之陽動何乃獨偏於右耶答經雲水火者陰陽之徵兆也陰陽者天地之道神明之府血氣男女萬物之終始也左右者陰陽之道路也坎中之陽偏於右者陰陽所行之道路固然耳如上所用者左升右旋流行之路也命門從右者五體生成形質之道也本左陽而右陰氣陽而血陰坎中之陽火也氣也坎體之陰水也血也腎坎居下焦地道也萬物皆生於地長於地故坎中之陽火互從右之陰而上行生脾土脾土生肺金坎體之陰水互從左之陽而上行生肝木肝生心火心肺居上焦天道也地氣生至於天其動已極極則復靜則天氣下降故離體之陽退入於地專居右之陰部以藏精離中之陰從肺降入於地專居左之陽部以生水地因夫天氣所入施化之德靜極復動動則還復以相生也於是居左心肝之陽臟主司血居右肺脾之陰臟主司氣者皆本地道互合陰陽而致之也夫聖人論陰陽有離有合內經以腎為一臟者用合體之坎而言也以水火氣血各有其路而行者用離體之坎而言也此浦江趙以德之說也明乎此可以無疑於右腎之為相火矣天有二火問天元紀大論云寒暑燥濕風火天之陰陽也三陰三陽上奉之木火土金水地之陰陽也生長化收藏下應之暑亦火也何火獨有二乎答君主不用事相代之故火有二也固也當看陰陽二字陽燧對日而得火天之陽火也龍雷之火天之陰火也鑽木擊石而得火也地之陽火也石油之火地之陰火也丙丁君火人之陽火也三焦心包絡命門相火人之陰火也陽火遇草而煤得木而燔可以濕伏可以水滅陰火不焚草木而流金石得濕愈焰遇水益熾以水折之則光焰詣天物窮方止以火遂之以灰撲之則灼性自消光焰自滅故治陽火者利用正治陰火者利用從治陽火者利用降治陰火者利用升治均之內虛火動也李東垣主助陽朱丹溪主助陰各有攸當也相火君火問今虛損發熱者皆言相火乘陰虛而動至於補中益氣證則未聞言相火也如前所云則勞倦所動乃相火而虛所動乃君火乎答勞倦所傷之為相火東垣明言之矣曰脾胃氣衰元氣不足而心火獨盛心火者陰火也起於下焦其繫系於心心不主令相火代之相火下焦包絡之火元氣之賊也火與元氣不二立一勝則一負脾胃氣虛則下流於腎陰火得以乘其土位故氣高而喘身熱而煩其脈洪大而頭痛或渴不止然則以柴胡升麻佐參耆歸術非特從陰位升出陽氣行春生之令乃是順其性而揚之蓋治陰火之法也若瘵之所損者精也離中之一陰即坎也坎中之一陽即離也陽無體以陰為體陰虧則陽無所附而不得不恣其炎上之性以為嘔血咳嗽骨蒸之症矣非質重味厚陰中之陰者安能固其陽根而斂之使返於宅乎故地黃丸所謂精不足者補之以味也補中益氣湯所謂形不足者溫之以氣也問地黃丸藥耳何為補之以味曰地黃之甘微苦山藥之甘山茱萸之酸牡丹皮之苦辛澤瀉之咸茯苓之淡以五味各入本臟用桂附之辛開腠理致津液通氣道輸而與之非補之以味而何何藥無氣何藥無味氣者天也味者地也溫熱者天之陽也寒涼者天之陰也陽則升陰則降辛甘者地之陽也酸苦者地之陰也陽則浮陰則沉有使氣者有使味者有氣味俱使者有先使氣後使味者有先使味後使氣者不可不審者也五味補瀉問五味之補瀉五臟其義何居答天地之氣不交則造化幾乎息矣故辛者散也東方之氣散宜辛而反酸是震中有兌也酸者斂也西方之氣斂宜酸而反辛是兌中有震也故酸入肝而補肺辛入肺而補肝是震兌互也鹹入腎而補心苦入心而補腎是坎離互也脾不主時寄旺於四季則守其本味而已矣至其瀉也又不然腎肝之各以本味為瀉易知也乃心脾獨異何耶曰心君主官也脾臟腑經絡之所從稟氣者也故獨異也君主之官以所生之味為瀉惡其泄氣也脾納水穀散精於臟腑新新相因故以生我之味為瀉惡其休氣也我王則生我者休故也治肝補脾金匱首條問曰上工治未病何也師曰夫治未病者見肝之病知肝傳脾當先實脾四季脾王不受邪即勿補之中工不曉相傳見肝之病不解實脾唯治肝也夫肝之病補用酸助用焦苦益用甘味之藥調之酸入肝焦苦入心甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛心火氣盛則傷肺肺被傷則金氣不行金氣不行則肝氣盛故實脾則肝自愈此治肝補脾之要妙也肝虛則用此法實則不在用之經曰實實虛虛損不足益有餘是其義也餘臟准此上工治未病不治已病見靈樞逆順篇肝病實脾乃七十七難之文而仲景述之補用酸云云則仲景之辭也嘗以問學者不了其義解難經者亦復憒憒若以肝病為肝虛則何不補其腎母而補脾土反生肺金以為之賊乎若以肝病為肝實則又與肝虛則用此法語相悖戾且實又能傷腎以致心火盛金氣不行而肝氣盛則肝病何時已乎此治肝補脾之要妙乃起死回生之祕訣而不熟讀素難則仲景婆心委之草莽而已今不惜饒舌博證而詳著之素問玉機真藏論曰五臟相通移皆有次五臟有病則各傳其所勝不治法三月若六月若三日若六日傳五臟而當死又曰風者百病之長也今風寒客於人使人毫毛畢直皮膏閉而為熱當是之時可汗而發也或痹不仁腫痛當是之時可湯尉及火灸刺而去之弗治病入舍於肺名曰肺痹發咳上氣弗治肺即傳而行之肝病名曰肝痹一名曰厥脅痛出食當是之時可按若刺耳弗治肝傳之脾病名曰脾風發疸腹中熱煩心出黃當此之時可按可藥可浴弗治脾傳之腎病名曰疝瘕少腹冤熱而痛出白一名曰蠱當此之時可按可藥弗治腎傳之心病筋脈相引而急病名曰瘛當此之時可灸可藥弗治滿十日法當死腎因傳之心心即復反傳而行之肺發寒熱法當三歲死此病之次也然其卒發者不必治於傳或其傳化有不以次不以次入者憂恐悲喜怒令不得以其次故令人有大病矣因而喜大虛則腎氣乘矣怒則肝氣乘矣悲則肺氣乘矣恐則脾氣乘矣憂則心氣乘矣此其道也故病有五五五二十五變及其傳化傳乘之名也上風邪入表蓋傳之緩者也標本病傳論曰夫病傳者心病先心痛一日而咳心火傳肺金三日脅支痛肺金傳肝木五日閉塞不通身痛體重肝木傳脾土三日不已死冬夜半夏日中肺病喘咳三日而脅支滿痛肺金傳肝木一日身重體痛肝木傳脾土五日而脹傳胃十日不已死冬日入夏日出肝病頭目眩脅支滿三日體重身痛肝木傳脾土五日而脹傳胃三日腰脊少腹痛脛酸脾胃土傳腎水三日不已死冬日入夏早食脾病身痛體重一日而脹脾自傳胃二日少腹腰脊痛脛酸脾土傳腎水三日背𦛗筋痛小便閉傳膀胱十日不已死冬人定夏晏食腎病少腹腰脊痛胻酸三日背𦛗筋痛小便閉腎傳膀胱三日腹脹腎膀胱水傳小腸火三日兩脅支痛小腸傳心三日不已死冬大晨夏晏晡胃病脹滿五日少腹腰脊痛胻酸胃土傳腎水三日背𦛗筋痛小便閉傳膀胱五日身體重膀胱水傳心火六日不已死冬夜半後夏日昳膀胱病小便閉五日少腹脹腰脊胻酸膀胱自傳一日腹脹腎水傳小腸火二日身體痛小腸傳心二日不已死冬雞鳴夏下哺諸病以次相傳如是者皆有死期不可刺間一臟止及至三四臟者乃可刺也上靈樞經謂之大氣入臟蓋傳之急者也王太僕云有緩傳者有急傳者緩者或一歲二歲三歲而死其次或三月若六月而死急者一日二日三日四日或五六日而死樓全善云王氏此言甚能推廣經意然不能驗日數者但驗病之次傳如心先病心痛次傳於肺或咳或喘次傳於肝或脅痛或頭眩次傳於脾胃或閉塞不通或身痛體重或脹或泄次傳於腎膀胱或少腹腰脊痛脛酸或背膂筋痛小便閉如此者必死無疑纍驗有準鄰人趙氏始病脅痛半載次傳之脾腹脹而死又卜叔英嫂氏始肺病喘咳次傳之肝頭眩不寐次傳之脾腹脹而死又楊白鹿師始脾病腹痛次傳之膀胱小便淋閉次傳之心胸痹痛通身青脈而死蓋心主血脈故也五十三難曰經言七傳者死間臟者生何謂也然七傳者傳其所勝也間藏者傳其子也何以言之假令心病傳於肺肺傳於肝肝傳於脾脾傳於腎腎傳於心一臟不再傷故言七傳者死也間臟者傳其所生也假令心病傳脾脾傳肺肺傳腎腎傳肝肝傳心是母子自相傳周而復始如環之無端故言生也七傳者死即素靈所言諸病以次相傳皆有死期不可刺者也間臟者生即素靈所言間一臟及至三四臟乃可刺者是也然傳其所勝不必皆歷七傳而後死故樓全善以七字為次字之誤玉機真藏論又云五臟受氣於其所生傳之於其所勝氣舍於其所生死於其所不勝病之且死必先傳行至其所不勝病乃死此言氣之逆行也故死肝受氣於心傳之於脾氣舍於腎至肺而死心受氣於脾傳之於肺氣舍於肝至腎而死脾受氣於肺傳之於腎氣舍於心至肝而死肺受氣於腎傳之於肝氣舍於脾至心而死腎受氣於肝傳之於心氣舍於肺至脾而死此皆逆死也一日一夜五分之此所以占死生之早暮也受氣謂受病氣也通前觀之乃知治肝補脾正為大氣入臟立治法故曰起死回生之祕訣也邪正相為勝負今正氣橫傾邪氣伴衍無與為敵故曰大氣也因正氣橫傾故謂之虛苟未至乎是皆作實論也故曰虛用此法實不用也本為實脾使肝之邪不得傳於脾卒之脾實而肝亦治故歷推之自脾能傷腎以至於肝氣盛則肝自愈也或曰脾氣盛則水穀之氣盛水穀之氣盛則五臟之精亦盛而腎有所受而藏之故曰補腎不如補脾此何為言脾能傷腎乎曰輕病緩治可論一氣之相生重病急治唯論五行這相剋孫兆宋名醫也虞部郎中汪奉老疾革有子可升當遺表奏蔭召孫診之孫以為不可治可升曰生且固難如何可延三日以待奏回孫曰郎中之患肝氣將絶脾土反勝當後脾土大旺肝氣乃絶方今日辰巳間當略瀉脾土使不能勝肝則木且未絶三日後奏下當日氣絶若以一瀉相生之當論之則瀉脾豈所以延生亦豈所以扶肝乎明者可以不言而悟也曰病之初起卒然而來何以知其為大氣入臟而用此法乎曰以五診得之諦視其邪正之分數以定強弱勝負而知之如肝病先從喘咳來其為七傳所不待言若從心痛來即防其傳脾而預實之緣五臟受氣於其所生必傳之於其所勝故也然則未至乎是者當用何法乎曰有正經自病有五邪所傷虛則補其母實則瀉其子東方實西方虛瀉南方補北方其法不一而足經言之詳矣麝臍藥市中唯麝臍易什而多僞塵史言宜置諸懷中以氣溫之久而視之手指按之柔軟者真也堅實者僞也歙人黃聖期為余言嘗見有鬻麝臍人華服浪遊多費因規之曰君之所業勢在不豐何過侈若是其人曰世之業藥得子錢多無如某者問其母錢日以銀二銖易麝一銖問其賣之直曰亦以銀二銖售麝一銖然則何謂子錢耶曰吾以它物什之而其香同其色又同雖老於藥市者不能辨也然則子何以辨之其人吝不肯言固問之因密語曰麝臍之內悉一氣凝結原無滓質第口噙良久泯化無跡者真也有滓質不化者僞也
